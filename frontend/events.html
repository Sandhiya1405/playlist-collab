<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlaylistCollab | Select Event</title>
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --success: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0b0f1a, #0b0f1a);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 900px; }

        /* topbar */
        .topbar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .logout-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: var(--text-dim); padding: 9px 18px; border-radius: 10px;
            cursor: pointer; font-size: 0.87rem; font-family: inherit; transition: all 0.25s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }

        header { text-align: center; margin-bottom: 50px; }
        header h1 {
            background: linear-gradient(to right, #c084fc, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 3rem; margin-bottom: 10px;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }
        .subtitle { color: var(--text-dim); font-size: 1.1rem; margin-top: 10px; }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px; margin-top: 40px;
        }

        /* skeleton while loading */
        .skeleton {
            background: var(--card-bg); border-radius: 20px;
            border: 1px solid var(--glass-border); height: 170px;
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

        .event-card {
            background: var(--card-bg); backdrop-filter: blur(12px);
            padding: 30px; border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            text-align: center;
        }
        .event-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 30px 60px -15px rgba(139,92,246,0.4);
        }
        /* newly added events get a subtle purple border */
        .event-card.new-event { border-color: rgba(139,92,246,0.25); }

        .event-icon  { font-size: 3rem; margin-bottom: 15px; }
        .event-name  { font-size: 1.3rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .event-desc  { font-size: 0.9rem; color: var(--text-dim); line-height: 1.4; }
        .new-pill {
            display: inline-block; margin-top: 10px;
            background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.3);
            color: #d8b4fe; font-size: 0.72rem; font-weight: 600;
            padding: 2px 10px; border-radius: 100px;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .events-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="topbar">
        <button class="logout-btn" onclick="logout()">← Logout</button>
    </div>

    <header>
        <h1>🎵 PlaylistCollab</h1>
        <p class="subtitle">Select an event to manage its playlist</p>
    </header>

    <!-- skeleton loaders shown while fetching -->
    <div class="events-grid" id="eventsGrid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
    </div>
</div>

<script>
    const API = 'http://localhost:5000/api';

    // Fallback defaults — shown if backend is offline
    const DEFAULTS = [
        { name:'Hostel Day',   icon:'🏠', description:'Annual hostel celebration' },
        { name:'Sem Fest',     icon:'📚', description:'Semester festival vibes' },
        { name:'Freshers Day', icon:'🎓', description:'Welcome new students' },
        { name:'Intrams',      icon:'🏆', description:'Sports tournament' },
        { name:'Kriya',        icon:'🔬', description:'Technical symposium' },
        { name:'Shrishti',     icon:'🎨', description:'Arts & crafts fest' },
        { name:'Infinitum',    icon:'♾️',  description:'Annual techno-cultural fest' },
        { name:'Culturals',    icon:'🎭', description:'Cultural events showcase' },
    ];

    const defaultNames = DEFAULTS.map(d => d.name);

    function selectEvent(name) {
        localStorage.setItem('selectedEvent', name);
        window.location.href = 'actions.html';
    }

    function logout() {
        localStorage.removeItem('user');
        localStorage.removeItem('token');
        localStorage.removeItem('userRole');
        window.location.href = 'auth.html';
    }

    function renderEvents(events) {
        const grid = document.getElementById('eventsGrid');
        grid.innerHTML = events.map(e => {
            const isNew = !defaultNames.includes(e.name);
            return `
                <div class="event-card${isNew?' new-event':''}"
                     onclick="selectEvent('${e.name.replace(/'/g,"\\'")}')">
                    <div class="event-icon">${e.icon || '🎵'}</div>
                    <div class="event-name">${e.name}</div>
                    <div class="event-desc">${e.description || ''}</div>

                </div>
            `;
        }).join('');
    }

    async function loadEvents() {
        try {
            // Fetch ALL events from Neo4j (default + organizer-added)
            const res    = await fetch(`${API}/events`);
            const events = await res.json();
            if (!res.ok || !Array.isArray(events) || !events.length) throw new Error();
            renderEvents(events);
        } catch {
            // Backend offline — show hardcoded defaults
            renderEvents(DEFAULTS);
        }
    }

    loadEvents();
</script>
</body>
</html>
